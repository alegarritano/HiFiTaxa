name: ci

on:
  push:
    branches: [main, master]
  pull_request:
  workflow_dispatch:

jobs:
  validate:
    runs-on: ubuntu-latest
    env:
      NXF_VER: '24.10.9'
      NXF_DISABLE_CHECK_LATEST: 'true'
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '17'
      - name: Install Nextflow
        run: |
          curl -s https://get.nextflow.io | bash
          sudo mv nextflow /usr/local/bin/
      - name: Validate config (standard + docker)
        run: |
          nextflow config -profile standard >/dev/null
          nextflow config -profile docker   >/dev/null
      - name: Compile full workflow (-preview, bundled example)
        run: nextflow run main.nf -profile standard,test -preview --outdir /tmp/o
      - name: Compile taxonomy_only (-preview)
        run: nextflow run main.nf -entry taxonomy_only -profile standard -preview --asv_fasta example/reference/dada2_ASV.fasta --outdir /tmp/t

  docker-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Build BLCA image
        run: docker build -f envs/Dockerfile -t hifitax:ci .
