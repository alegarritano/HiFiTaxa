name: traffic-stats

# Snapshot GitHub clone + view traffic weekly and append it to traffic/*.csv,
# so the 14-day API window becomes permanent daily history.
#
# Setup (one-time): create a repo secret named TRAFFIC_TOKEN holding a PAT that
# can read this repo's traffic — a fine-grained token with "Administration: Read"
# on the repo, or a classic token with the "repo" scope. The default Actions
# GITHUB_TOKEN cannot read traffic, which is why a PAT is needed for the fetch.
# The commit/push uses the built-in GITHUB_TOKEN (contents: write below).

on:
  schedule:
    - cron: '17 3 * * 1'        # Mondays 03:17 UTC (any interval < 14 days = gap-free daily history)
  workflow_dispatch:

permissions:
  contents: write               # to commit the updated CSVs

jobs:
  log-traffic:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Append clone + view traffic
        env:
          TRAFFIC_TOKEN: ${{ secrets.TRAFFIC_TOKEN }}
        run: python3 bin/log_traffic.py "${{ github.repository }}" traffic

      - name: Commit if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add traffic/
          git diff --cached --quiet && { echo "no new traffic data"; exit 0; }
          git commit -m "traffic: snapshot $(date -u +%F)"
          git push
